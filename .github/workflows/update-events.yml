name: Update Music Events

on:
  schedule:
    # GitHub explicitly warns that schedules on the hour (minute 0) hit peak
    # queue congestion and can be delayed for hours or dropped entirely --
    # confirmed happening here: the original Friday cron never fired via
    # `schedule` even once (only manual/push runs show up in the history).
    # Offsetting to :17 avoids the top-of-hour pileup.
    - cron: '17 12 * * *'  # Every day ~7am/8am Central, depending on DST
  workflow_dispatch:  # Allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Runs the single pipeline: crawlers -> image inbox (GPT-4o Vision) ->
      # normalise + confidence + provenance -> SQLite -> reconcile -> Excel ->
      # dashboard. run_monitor.py regenerates docs/index.html itself, so there
      # is no copy step (the old `cp data/index.html docs/index.html` clobbered
      # the real dashboard).
      - name: Run pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python run_monitor.py

      - name: Commit updated dashboard + database
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data/events.db docs/index.html
          git diff --staged --quiet || git commit -m "Auto-update events $(date +'%Y-%m-%d')"
          git push
