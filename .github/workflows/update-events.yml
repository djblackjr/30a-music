name: Update Music Events

on:
  schedule:
    # GitHub's own `schedule` trigger has never reliably fired for this repo
    # (confirmed: the original Friday cron never ran once via `schedule` --
    # only manual/dispatch runs show up in the history). Kept only as a
    # fallback in case it fires; the real trigger is now an external
    # cron-job.org ping hitting workflow_dispatch directly (same fix as the
    # sibling 331 Bridge Fishing Report app, where it's been running
    # reliably). workflow_dispatch runs aren't subject to the same queue
    # congestion as `schedule` is.
    - cron: '17 12 * * *'  # Every day ~7am/8am Central, depending on DST
  workflow_dispatch:  # Allow manual trigger — this is what cron-job.org calls

permissions:
  # Default GITHUB_TOKEN is read-only unless declared otherwise; without this
  # the pipeline step succeeds but "git push" 403s, silently leaving the live
  # dashboard on the previous day's build. Confirmed via the Actions API: the
  # one schedule-triggered run that ever fired (2026-07-16) built fine and
  # failed only on the commit/push step.
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Runs the single pipeline: crawlers -> image inbox (GPT-4o Vision) ->
      # normalise + confidence + provenance -> SQLite -> reconcile -> Excel ->
      # dashboard. run_monitor.py regenerates docs/index.html itself, so there
      # is no copy step (the old `cp data/index.html docs/index.html` clobbered
      # the real dashboard).
      - name: Run pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python run_monitor.py

      - name: Commit updated dashboard + database
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data/events.db docs/index.html
          git diff --staged --quiet || git commit -m "Auto-update events $(date +'%Y-%m-%d')"
          git push
