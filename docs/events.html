function fmt(d){
  if(!d)return'';
  var p=d.split('-');
  return new Date(+p[0],+p[1]-1,+p[2]).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
}

function go(){
  var q=document.getElementById('q').value.toLowerCase();
  var df=document.getElementById('df').value;
  var today=new Date().toISOString().slice(0,10);
  var f=DATA.filter(function(r){
    if(df==='up'&&r[1]<today)return false;
    if(df==='past'&&r[1]>=today)return false;
    if(q&&(r[0]+r[3]+r[4]).toLowerCase().indexOf(q)<0)return false;
    return true;
  });
  f.sort(function(a,b){return a[sk]<b[sk]?-sd:a[sk]>b[sk]?sd:0;});

  var today2=new Date().toISOString().slice(0,10);
  document.getElementById('tb').innerHTML=f.map(function(r){
    var cls=r[1]>=today2?'up':'';
    var vt=r[3]?'<span class="tag vtag">'+r[3]+'</span>':'';
    var at=r[4]?'<span class="tag atag">'+r[4]+'</span>':'';

  }).join('')||'<tr><td colspan="6" style="text-align:center;padding:30px;color:#aaa">No events</td></tr>';
}
