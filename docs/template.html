<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>30A Music Intelligence</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,sans-serif;background:#F5F0E8;font-size:17px;}
header{background:#1F3864;color:#fff;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;}
header h1{font-size:1.3rem;margin:0;}
header p{font-size:.72rem;opacity:.6;margin-top:2px;}
.stats{display:flex;background:#fff;border-bottom:2px solid #e9ecef;flex-wrap:wrap;}
.stat{padding:12px 24px;border-right:1px solid #e9ecef;text-align:center;}
.stat .n{font-size:1.6rem;font-weight:700;color:#1F3864;}
.stat .l{font-size:.62rem;color:#adb5bd;text-transform:uppercase;}
.filters{padding:12px 16px;background:#fff;border-bottom:1px solid #e9ecef;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.filters input,.filters select{padding:8px 12px;border:1px solid #ddd;border-radius:5px;font-size:.9rem;background:#fff;outline:none;}
.filters input{width:200px;}
.filters button{padding:8px 14px;border:1px solid #ddd;border-radius:5px;background:#fff;cursor:pointer;font-size:.85rem;}
.cnt{margin-left:auto;font-size:.85rem;color:#6c757d;}
.wrap{padding:16px;}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:6px;box-shadow:0 2px 8px rgba(0,0,0,.08);overflow:hidden;}
th{background:#1F3864;color:#fff;padding:11px 14px;text-align:left;font-size:.85rem;cursor:pointer;white-space:nowrap;}
th:hover{background:#1B7A8A;}
th.asc::after{content:" ▲";font-size:.65rem;}
th.desc::after{content:" ▼";font-size:.65rem;}
td{padding:9px 14px;border-bottom:1px solid #f0f0f0;font-size:.9rem;vertical-align:middle;}
tr:hover td{background:#f5faff;}
tr.up td:first-child{border-left:3px solid #1B7A8A;}
tr.up td{background:rgba(27,122,138,.04);}
a{color:#1B7A8A;text-decoration:none;}
</style></head><body>
<header>
  <div><h1>🎵 30A Music Intelligence</h1><p>Emerald Coast Live Music &amp; Events</p></div>
  <p style="font-size:.7rem;opacity:.5" id="upd"></p>
</header>
<div class="stats">
  <div class="stat"><div class="n">TOTAL_PLACEHOLDER</div><div class="l">Total</div></div>
  <div class="stat"><div class="n" id="ss">0</div><div class="l">Showing</div></div>
  <div class="stat"><div class="n" id="sv">0</div><div class="l">Venues</div></div>
  <div class="stat"><div class="n" id="sa">0</div><div class="l">Artists</div></div>
</div>
<div class="filters">
  <input type="search" id="q" placeholder="Search..." oninput="go()">
  <select id="vf" onchange="go()"><option value="">All Venues</option></select>
  <select id="af" onchange="go()"><option value="">All Artists</option></select>
  <select id="df" onchange="go()">
    <option value="up" selected>Upcoming</option>
    <option value="all">All Dates</option>
    <option value="past">Past</option>
    <option value="week">This Week</option>
    <option value="month">This Month</option>
  </select>
  <button onclick="clearAll()">Clear</button>
  <span class="cnt" id="cnt"></span>
</div>
<div class="wrap"><table>
<thead><tr>
  <th onclick="srt('name')">Artist</th>
  <th onclick="srt('date')">Date</th>
  <th>Time</th>
  <th onclick="srt('venue')">Venue</th>
  <th>Link</th>
</tr></thead>
<tbody id="tb">TBODY_PLACEHOLDER</tbody>
</table></div>
<script>
var T=new Date().toISOString().slice(0,10);var sk='date',sd=1;
document.getElementById('upd').textContent='Updated '+new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'});
function bd(){var vv={},aa={};document.querySelectorAll('#tb tr').forEach(function(r){var dt=r.getAttribute('data-date')||'';var v=r.getAttribute('data-venue')||'';var a=r.getAttribute('data-performer')||'';if(dt>=T){if(v)vv[v]=1;if(a)aa[a]=1;}});var vs=document.getElementById('vf');Object.keys(vv).sort().forEach(function(v){var o=document.createElement('option');o.value=v;o.textContent=v;vs.appendChild(o);});var as=document.getElementById('af');Object.keys(aa).sort().forEach(function(a){var o=document.createElement('option');o.value=a;o.textContent=a;as.appendChild(o);});}
function we(){var d=new Date();d.setDate(d.getDate()+7);return d.toISOString().slice(0,10);}
function me(){var d=new Date();d.setMonth(d.getMonth()+1);return d.toISOString().slice(0,10);}
function go(){var q=document.getElementById('q').value.toLowerCase();var vf=document.getElementById('vf').value;var af=document.getElementById('af').value;var df=document.getElementById('df').value;var w=we(),m=me();var rows=document.querySelectorAll('#tb tr');var n=0,vv={},aa={};rows.forEach(function(r){var dt=r.getAttribute('data-date')||'';var v=r.getAttribute('data-venue')||'';var a=r.getAttribute('data-performer')||'';var nm=r.getAttribute('data-name')||'';var s=true;if(df==='up'&&dt<T)s=false;if(df==='past'&&dt>=T)s=false;if(df==='week'&&(dt<T||dt>w))s=false;if(df==='month'&&(dt<T||dt>m))s=false;if(vf&&v!==vf)s=false;if(af&&a!==af)s=false;if(q&&(nm+' '+v+' '+a).toLowerCase().indexOf(q)<0)s=false;r.style.display=s?'':'none';r.className=(s&&dt>=T)?'up':'';if(s){n++;if(v)vv[v]=1;if(a)aa[a]=1;}});document.getElementById('ss').textContent=n;document.getElementById('sv').textContent=Object.keys(vv).length;document.getElementById('sa').textContent=Object.keys(aa).length;document.getElementById('cnt').textContent=n+' event'+(n!==1?'s':'');}
function srt(k){var tb=document.getElementById('tb');var rows=Array.from(tb.querySelectorAll('tr'));if(sk===k){sd*=-1;}else{sk=k;sd=1;}var m={'name':'data-name','date':'data-date','venue':'data-venue','performer':'data-performer'};rows.sort(function(a,b){var av=a.getAttribute(m[k])||'',bv=b.getAttribute(m[k])||'';return av<bv?-sd:av>bv?sd:0;});rows.forEach(function(r){tb.appendChild(r);});document.querySelectorAll('th').forEach(function(t){t.classList.remove('asc','desc');});go();}
function clearAll(){document.getElementById('q').value='';document.getElementById('vf').value='';document.getElementById('af').value='';document.getElementById('df').value='up';go();}
bd();go();
</script></body></html>
